name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**
      - fix/**
      - refactor/**
      - test/**

jobs:
  python-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile app.py config.py models.py init_db.py

      - name: Import smoke test
        run: |
          python - <<'PY'
          import app
          import models
          print("Flask import ok:", hasattr(app, "app"))
          print("Models import ok:", hasattr(models, "db"))
          PY
