model: Pro/zai-org/GLM-5
label:
  zh_Hans: Pro/zai-org/GLM-5
  en_US: Pro/zai-org/GLM-5
model_type: llm
features:
  - tool-call
  - agent-thought
  - multi-tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 200000
parameter_rules:
  - name: temperature
    use_template: temperature
    type: float
    default: 1.0
    min: 0
    max: 2
  - name: max_tokens
    use_template: max_tokens
    type: int
    default: 8192
    min: 1
    max: 204800
    help:
      zh_Hans: 指定生成结果长度的上限。如果生成结果截断，可以调大该参数。
      en_US: Specifies the upper limit on the length of generated results. If the generated results are truncated, you can increase this parameter.
  - name: top_p
    use_template: top_p
    type: float
    default: 0.95
    min: 0.1
    max: 1.0
  - name: frequency_penalty
    use_template: frequency_penalty
    type: float
    default: 0.0
    min: -2.0
    max: 2.0
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    help:
      zh_Hans: 指定模型必须输出的格式
      en_US: specifying the format that the model must output
    required: false
    options:
      - text
      - json_object
  - name: enable_thinking
    required: false
    type: boolean
    default: true
    label:
      zh_Hans: 思考模式
      en_US: Thinking mode
    help:
      zh_Hans: 是否开启思考模式。
      en_US: Whether to enable thinking mode.
  - name: thinking_budget
    required: false
    type: int
    default: 4096
    min: 1
    max: 204800
    label:
      zh_Hans: 思考长度限制
      en_US: Thinking budget
    help:
      zh_Hans: 思考过程的最大长度，只在思考模式为true时生效。
      en_US: The maximum length of the thinking process, only effective when thinking mode is true.
pricing:
  input: '4'
  output: '22'
  unit: '0.000001'
  currency: RMB
