model: stepfun-ai/Step-3.5-Flash
label:
  en_US: stepfun-ai/Step-3.5-Flash
model_type: llm
features:
  - agent-thought
  - tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 262144
parameter_rules:
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    help:
      zh_Hans: 指定模型必须输出的格式
      en_US: specifying the format that the model must output
    required: false
    options:
      - text
      - json_object
pricing:
  input: "0.7"
  output: "2.1"
  unit: "0.000001"
  currency: RMB
