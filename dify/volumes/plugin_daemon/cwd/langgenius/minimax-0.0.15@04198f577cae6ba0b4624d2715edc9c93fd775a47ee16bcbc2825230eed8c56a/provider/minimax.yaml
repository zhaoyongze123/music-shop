background: '#FFEFEF'
configurate_methods:
- predefined-model
extra:
  python:
    model_sources:
    - models/llm/llm.py
    - models/text_embedding/text_embedding.py
    - models/tts/tts.py
    provider_source: provider/minimax.py
help:
  title:
    en_US: Get your API Key from Minimax
    zh_Hans: 从 Minimax 获取您的 API Key
  url:
    en_US: https://platform.minimax.io/user-center/payment/token-plan
icon_large:
  en_US: icon_l_en.png
icon_small:
  en_US: icon_s_en.png
label:
  en_US: Minimax
models:
  llm:
    predefined:
    - models/llm/*.yaml
  text_embedding:
    predefined:
    - models/text_embedding/*.yaml
  tts:
    predefined:
    - models/tts/*.yaml
provider: minimax
provider_credential_schema:
  credential_form_schemas:
  - label:
      en_US: API Key
    placeholder:
      en_US: Enter your API Key
      zh_Hans: 在此输入您的 API Key
    required: true
    type: secret-input
    variable: minimax_api_key
  - label:
      en_US: Group ID
    placeholder:
      en_US: Required only for legacy ABAB chat, embedding, and TTS models. Leave empty for MiniMax-M2.x.
      zh_Hans: 仅在使用 ABAB chat、Embedding、TTS 模型时需要；MiniMax-M2.x 留空即可。
    required: false
    type: text-input
    variable: minimax_group_id
  - default: https://api.minimax.io
    label:
      en_US: API Base
      zh_Hans: API Base
    placeholder:
      en_US: Enter your API Base
      zh_Hans: 在此输入您的 API Base
    required: false
    type: text-input
    variable: endpoint_url
supported_model_types:
- llm
- text-embedding
- tts
